name: Bug Report
description: File a bug report for the Fronius Gen24 integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        Please provide as much detail as possible to help diagnose the issue.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2024.4.0
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: inverter_fw
    attributes:
      label: Inverter firmware version
      description: Reported by the GEN24 Software Version sensor
      placeholder: e.g. 1.29.1-1
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Enable debug logging (`custom_components.fronius_rest: debug`) and paste relevant lines here.
      render: text
    validations:
      required: false
